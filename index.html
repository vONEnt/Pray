<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой сайт</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      color: blue;
      cursor: pointer;
    }

    p {
      display: none;
      margin-bottom: 20px;
    }
  </style>

  <script>
    function toggle(id) {
      let e = document.getElementById(id);
      if (e.style.display === "none" || e.style.display === "") {
        e.style.display = "block";
      } else {
        e.style.display = "none";
      }
    }
  </script>
</head>

<body>

<h1>Мой сайт</h1>

<h2 onclick="toggle('t1')">Заголовок 1</h2>
<p id="t1">Это текст первой статьи</p>

<h2 onclick="toggle('t2')">Заголовок 2</h2>
<p id="t2">Это текст второй статьи</p>

</body>
</html>
